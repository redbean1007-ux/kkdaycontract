<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKday 供應商合作合約書填寫表單</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-size: 1.6rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
  }

  .logo span { color: #f0b429; }

  header p {
    color: #888;
    font-size: 0.85rem;
    margin-top: 2px;
  }

  .container {
    max-width: 820px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
  }

  .section {
    background: #fff;
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    border: 1px solid #e5e3dc;
  }

  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid #f0ece4;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .field-grid.triple {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .field-grid.full {
    grid-template-columns: 1fr;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.span2 { grid-column: span 2; }

  label {
    font-size: 0.78rem;
    font-weight: 500;
    color: #555;
    letter-spacing: 0.01em;
  }

  label .req {
    color: #e24b4a;
    margin-left: 3px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    color: #1a1a1a;
    background: #fafaf8;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #1a1a1a;
    box-shadow: 0 0 0 3px rgba(26,26,26,0.08);
    background: #fff;
  }

  .date-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 0.75rem;
  }

  .date-row span {
    font-size: 0.85rem;
    color: #888;
    text-align: center;
  }

  .bank-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .info-box {
    background: #f9f8f5;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    border-left: 3px solid #f0b429;
    font-size: 0.82rem;
    color: #666;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 0.75rem;
    border: 1px solid #eee;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    font-size: 0.84rem;
    color: #444;
  }

  .checkbox-item:hover { background: #f9f8f5; border-color: #ddd; }

  .checkbox-item input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: #1a1a1a;
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-item.checked {
    background: #1a1a1a;
    border-color: #1a1a1a;
    color: #fff;
  }

  .btn-generate {
    width: 100%;
    padding: 1rem;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn-generate:hover { background: #333; }
  .btn-generate:active { transform: scale(0.99); }

  .btn-generate.loading {
    background: #666;
    cursor: not-allowed;
  }

  .success-msg {
    display: none;
    margin-top: 1rem;
    padding: 1rem;
    background: #eaf3de;
    border-radius: 8px;
    color: #3b6d11;
    font-size: 0.88rem;
    text-align: center;
  }

  .required-note {
    font-size: 0.75rem;
    color: #999;
    margin-bottom: 1.5rem;
  }

  .required-note span { color: #e24b4a; }

  @media (max-width: 600px) {
    .field-grid, .field-grid.triple, .bank-grid, .service-grid {
      grid-template-columns: 1fr;
    }
    .field.span2 { grid-column: span 1; }
  }
</style>
</head>

    <p>供應商合作合約書 — 資料填寫表單</p>

</header>

<div class="container">

  <p class="required-note"><span>*</span> 為必填欄位</p>

  <!-- 合約期間 -->
  <div class="section">
    <div class="section-title">第一條　合約期間</div>
    <div class="field">
      <label>合約有效期間 <span class="req">*</span></label>
      <div class="date-row">
        <input type="date" id="start_date">
        <span>至</span>
        <input type="date" id="end_date">
      </div>
    </div>
  </div>

  <!-- 乙方基本資料 -->
  <div class="section">
    <div class="section-title">乙方（供應商）基本資料</div>
    <div class="field-grid">
      <div class="field span2">
        <label>公司／個人名稱 <span class="req">*</span></label>
        <input type="text" id="company_name" placeholder="請輸入登記名稱">
      </div>
      <div class="field span2">
        <label>統一編號 / 登記號碼</label>
        <input type="text" id="tax_id" placeholder="若有請填寫">
      </div>
      <div class="field span2">
        <label>負責人姓名 <span class="req">*</span></label>
        <input type="text" id="rep_name" placeholder="負責人或代表人">
      </div>
      <div class="field span2">
        <label>註冊地址 <span class="req">*</span></label>
        <input type="text" id="reg_address" placeholder="公司或個人登記地址">
      </div>
      <div class="field span2">
        <label>聯絡地址</label>
        <input type="text" id="contact_address" placeholder="若與註冊地址相同可留空">
      </div>
      <div class="field">
        <label>聯絡人 <span class="req">*</span></label>
        <input type="text" id="contact_name" placeholder="業務聯絡窗口">
      </div>
      <div class="field">
        <label>聯絡電話 <span class="req">*</span></label>
        <input type="tel" id="contact_tel" placeholder="含國碼，如 +886-2-XXXX-XXXX">
      </div>
      <div class="field span2">
        <label>聯絡人 E-mail <span class="req">*</span></label>
        <input type="email" id="contact_email" placeholder="business@example.com">
      </div>
    </div>
  </div>

  <!-- 銀行帳戶資訊 -->
  <div class="section">
    <div class="section-title">第二條　收款帳戶資訊</div>
    <div class="info-box">
      帳款將於每月25個工作天內匯至以下帳戶。請確認資訊正確，若有誤導致付款失敗，責任由乙方自行承擔。
    </div>
    <div class="bank-grid">
      <div class="field">
        <label>銀行名稱 <span class="req">*</span></label>
        <input type="text" id="bank_name" placeholder="如：台灣銀行">
      </div>
      <div class="field">
        <label>銀行代碼</label>
        <input type="text" id="bank_code" placeholder="如：004">
      </div>
      <div class="field">
        <label>分行名稱</label>
        <input type="text" id="branch_name" placeholder="如：內湖分行">
      </div>
      <div class="field">
        <label>分行代碼</label>
        <input type="text" id="branch_code" placeholder="如：0047">
      </div>
      <div class="field">
        <label>戶名 <span class="req">*</span></label>
        <input type="text" id="account_name" placeholder="帳戶登記名稱">
      </div>
      <div class="field">
        <label>銀行帳號 <span class="req">*</span></label>
        <input type="text" id="account_number" placeholder="帳號">
      </div>
      <div class="field">
        <label>SWIFT CODE（跨國匯款）</label>
        <input type="text" id="swift_code" placeholder="如：BKTWTWTP">
      </div>
      <div class="field">
        <label>收款行國別</label>
        <input type="text" id="bank_country" placeholder="如：台灣 / Taiwan">
      </div>
    </div>
  </div>

  <!-- 提供服務類別 -->

<script>
// Toggle checked style on checkbox items
document.querySelectorAll('.checkbox-item').forEach(label => {
  const cb = label.querySelector('input');
  function sync() {
    label.classList.toggle('checked', cb.checked);
  }
  sync();
  cb.addEventListener('change', sync);
});

function val(id) {
  return (document.getElementById(id)?.value || '').trim();
}

function formatDate(dateStr) {
  if (!dateStr) return '　　　年　　月　　日';
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y} 年 ${m} 月 ${day} 日`;
}

async function generatePDF() {
  // Validate required fields
  const required = [
    ['start_date', '合約開始日期'],
    ['end_date', '合約結束日期'],
    ['company_name', '公司名稱'],

    ['bank_name', '銀行名稱'],
    ['account_name', '戶名'],
    ['account_number', '銀行帳號'],
    ['sign_date', '簽約日期'],
  ];

  for (const [id, label] of required) {
    if (!val(id)) {
      alert(`請填寫「${label}」欄位`);
      document.getElementById(id)?.focus();
      return;
    }
  }

  const btn = document.querySelector('.btn-generate');
  btn.textContent = '產生中…';
  btn.classList.add('loading');
  btn.disabled = true;

  const { jsPDF } = window.jspdf;

  // Collect data
  const data = {
    company_name: val('company_name'),
    tax_id: val('tax_id'),
    rep_name: val('rep_name'),

    end_date: formatDate(val('end_date')),
    sign_date: formatDate(val('sign_date')),
    services: Array.from(document.querySelectorAll('#service_grid input:checked')).map(cb => cb.value),
  };

  // Load font (NotoSansTC base64 subset via Google Fonts API approach)
  // We'll use a Unicode-capable approach via canvas trick

  try {
    await buildPDF(data);
    document.getElementById('success_msg').style.display = 'block';
  } catch(e) {
    console.error(e);
    alert('PDF 產生失敗，請重試。');
  }

  btn.textContent = '產生合約書 PDF';
  btn.classList.remove('loading');

}

async function buildPDF(d) {
  const { jsPDF } = window.jspdf;

  // We'll render each page to canvas using HTML Canvas + ctx for CJK support
  // then embed as image into jsPDF

  const pages = buildPageContents(d);
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const A4W = 210, A4H = 297;

  for (let i = 0; i < pages.length; i++) {
    if (i > 0) doc.addPage();
    const canvas = await renderPageToCanvas(pages[i], A4W, A4H);
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    doc.addImage(imgData, 'JPEG', 0, 0, A4W, A4H);
  }

  doc.save(`KKday供應商合作合約書_${d.company_name}.pdf`);
}

async function renderPageToCanvas(commands, mmW, mmH) {
  const DPI = 150;
  const px = v => Math.round(v * DPI / 25.4);
  const cw = px(mmW);
  const ch = px(mmH);
  const ml = px(18), mr = px(18), mt = px(15);

  const canvas = document.createElement('canvas');
  canvas.width = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cw, ch);

  const bodySize = px(3.5);
  const boldSize = px(3.8);
  const titleSize = px(5);
  const usableW = cw - ml - mr;

  let y = mt;

  function wrapText(ctx, text, x, maxW, lineH) {
    const chars = [...text];
    let line = '';
    let lines = [];
    for (let c of chars) {
      const test = line + c;
      if (ctx.measureText(test).width > maxW && line.length > 0) {
        lines.push(line);
        line = c;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function drawText(text, x, fontSize, color='#1a1a1a', weight='normal', maxW=usableW) {
    ctx.font = `${weight} ${fontSize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
    ctx.fillStyle = color;
    const lines = wrapText(ctx, text, x, maxW, fontSize * 1.7);
    for (const l of lines) {
      if (y + fontSize > ch - px(10)) return;
      ctx.fillText(l, x, y + fontSize);
      y += Math.round(fontSize * 1.7);
    }
    return lines.length;
  }

  for (const cmd of commands) {
    if (y > ch - px(15)) break;

    if (cmd.type === 'space') {
      y += px(cmd.h);
    }
    else if (cmd.type === 'logo') {
      ctx.font = `800 ${px(7)}px 'Noto Sans TC', sans-serif`;
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText('kkday', cw - mr - ctx.measureText('kkday').width, mt + px(5));
    }
    else if (cmd.type === 'title') {
      ctx.font = `500 ${titleSize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#1a1a1a';
      const tw = ctx.measureText(cmd.text).width;
      ctx.fillText(cmd.text, ml + (usableW - tw) / 2, y + titleSize);
      y += Math.round(titleSize * 2);
    }
    else if (cmd.type === 'smalltitle') {
      ctx.font = `500 ${px(3)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#888';
      ctx.fillText(cmd.text, ml, y + px(3));
      y += Math.round(px(3) * 1.8);
    }
    else if (cmd.type === 'body') {
      drawText(cmd.text, ml, bodySize);
    }
    else if (cmd.type === 'bold') {
      ctx.font = `500 ${boldSize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#1a1a1a';
      const lines = wrapText(ctx, cmd.text, ml, usableW, boldSize * 1.7);
      for (const l of lines) {
        ctx.fillText(l, ml, y + boldSize);
        y += Math.round(boldSize * 1.7);
      }
    }
    else if (cmd.type === 'hrule') {
      ctx.strokeStyle = '#e5e3dc';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(ml, y); ctx.lineTo(cw - mr, y); ctx.stroke();
      y += px(3);
    }
    else if (cmd.type === 'fieldrow') {
      ctx.font = `normal ${bodySize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#555';
      ctx.fillText(cmd.label, ml, y + bodySize);
      const lw = ctx.measureText(cmd.label).width;
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText(cmd.value || '　', ml + lw + 4, y + bodySize);
      y += Math.round(bodySize * 2.2);
    }
    else if (cmd.type === 'signline') {
      ctx.font = `normal ${bodySize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#555';
      ctx.fillText(cmd.label, ml, y + bodySize);
      const lw = ctx.measureText(cmd.label).width;
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(ml + lw + 8, y + bodySize + 2);
      ctx.lineTo(ml + lw + px(40), y + bodySize + 2);
      ctx.stroke();
      y += Math.round(bodySize * 2.5);
    }
    else if (cmd.type === 'signdate') {
      drawText(`西元　${cmd.date}`, ml, bodySize);
    }
    else if (cmd.type === 'banktable') {
      const d2 = cmd.data;
      const rows = [
        ['銀行帳號', d2.account_number, '戶名', d2.account_name],
        ['銀行名稱', d2.bank_name, '銀行代碼', d2.bank_code],
        ['分行名稱', d2.branch_name, '分行代碼', d2.branch_code],
        ['SWIFT CODE', d2.swift_code || '（依個案需要填寫）', '收款行國別', d2.bank_country],
      ];
      const colW = [px(22), usableW/2 - px(22), px(22), usableW/2 - px(22)];
      const rowH = px(7);

      rows.forEach((row, ri) => {
        let xOff = ml;
        row.forEach((cell, ci) => {
          ctx.strokeStyle = '#ccc';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(xOff, y, colW[ci], rowH);
          const isLabel = ci % 2 === 0;
          ctx.font = `${isLabel ? '500' : 'normal'} ${px(3)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
          ctx.fillStyle = isLabel ? '#555' : '#1a1a1a';
          ctx.fillText(cell || '', xOff + 4, y + rowH / 2 + px(1.5));
          xOff += colW[ci];
        });
        y += rowH;
      });
      y += px(2);
    }
    else if (cmd.type === 'partyblock') {
      const isB = cmd.party === 'B';
      const name = isB ? cmd.data.company_name : cmd.name;
      const rep = isB ? cmd.data.rep_name : cmd.rep;
      const reg = isB ? cmd.data.reg_address : cmd.reg_addr;
      const caddr = isB ? (cmd.data.contact_address || cmd.data.reg_address) : cmd.reg_addr;
      const cn = isB ? cmd.data.contact_name : cmd.contact_name;
      const ct = isB ? cmd.data.contact_tel : cmd.contact_tel;
      const ce = isB ? cmd.data.contact_email : cmd.contact_email;

      const fields = [
        { label: '公司名稱：', value: name },
        { label: '負責人：', value: rep },
        { label: '註冊地址：', value: reg },
        { label: '聯絡地址：', value: caddr },
        { label: '聯絡人：', value: cn },
        { label: '聯絡電話：', value: ct },
        { label: '聯絡人E-mail：', value: ce },
      ];

      for (const f of fields) {
        ctx.font = `normal ${bodySize}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
        ctx.fillStyle = '#666';
        ctx.fillText(f.label, ml, y + bodySize);
        const lw = ctx.measureText(f.label).width;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillText(f.value || '', ml + lw + 4, y + bodySize);
        y += Math.round(bodySize * 1.9);
      }

      y += px(3);
      // Signature line
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(ml, y); ctx.lineTo(ml + px(55), y);
      ctx.stroke();
      ctx.setLineDash([]);
      y += px(2);
      ctx.font = `normal ${px(2.8)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#888';
      ctx.fillText('（此處蓋章或簽名）', ml, y + px(2.8));
      y += px(6);
    }
    else if (cmd.type === 'servicetable') {
      const allServices = [
        '套裝旅遊', '旅宿類（如旅館、民宿、露營）', '餐飲類', '租車類',
        '車類交通接送類', '非車類交通接送類（如：輕航機、直升機、遊艇）',
        '定點活動體驗類', '景點票、展演票', '實體商品（如：SIM Card、伴手禮）',
        '器材租賃（如：Wifi機）', '委託服務（如：代辦、配送、行李托運）', '其他',
      ];
      const selected = cmd.services || [];
      const rowH = px(6.5);
      const checkW = px(10);

      // Header
      ctx.fillStyle = '#f5f4f0';
      ctx.fillRect(ml, y, checkW, rowH);
      ctx.fillRect(ml + checkW, y, usableW - checkW, rowH);
      ctx.strokeStyle = '#bbb'; ctx.lineWidth = 0.5;
      ctx.strokeRect(ml, y, checkW, rowH);
      ctx.strokeRect(ml + checkW, y, usableW - checkW, rowH);
      ctx.font = `500 ${px(3)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
      ctx.fillStyle = '#444';
      ctx.fillText('請勾選', ml + 4, y + rowH/2 + px(1.5));
      ctx.fillText('提供商品或服務類型', ml + checkW + 4, y + rowH/2 + px(1.5));
      y += rowH;

      for (const svc of allServices) {
        const checked = selected.includes(svc);
        ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
        ctx.strokeRect(ml, y, checkW, rowH);
        ctx.strokeRect(ml + checkW, y, usableW - checkW, rowH);
        // Checkbox
        const cbx = ml + checkW/2 - px(2);
        const cby = y + rowH/2 - px(2);
        ctx.strokeStyle = '#888'; ctx.lineWidth = 0.8;
        ctx.strokeRect(cbx, cby, px(4), px(4));
        if (checked) {
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(cbx + px(0.5), cby + px(0.5), px(3), px(3));
        }
        ctx.font = `normal ${px(3)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillText(svc, ml + checkW + 4, y + rowH/2 + px(1.5));
        y += rowH;
      }
      y += px(2);
    }
  }

  // Page number at bottom
  ctx.font = `normal ${px(2.8)}px 'Noto Sans TC', 'Microsoft JhengHei', sans-serif`;
  ctx.fillStyle = '#aaa';
  const pn = '第 1 頁';
  ctx.fillText('KKday 供應商合作合約書', ml, ch - px(8));

  return canvas;
}
</script>
</body>
</html>
