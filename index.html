<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKday 供應商合作合約書填寫表單</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }
header { background: #1a1a1a; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; }
.logo-img { height: 44px; width: 44px; border-radius: 50%; flex-shrink: 0; }
.logo { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; }
.logo span { color: #29cad4; }
header p { color: #888; font-size: 0.82rem; margin-top: 2px; }
.container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
.section { background: #fff; border-radius: 12px; padding: 1.75rem 2rem; margin-bottom: 1.25rem; border: 1px solid #e5e3dc; }
.section-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa; margin-bottom: 1.25rem; padding-bottom: 0.6rem; border-bottom: 1px solid #f0ece4; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.span2 { grid-column: span 2; }
label { font-size: 0.78rem; font-weight: 500; color: #555; }
label .req { color: #e24b4a; margin-left: 2px; }
input[type="text"], input[type="email"], input[type="tel"], input[type="date"] {
  width: 100%; padding: 0.55rem 0.75rem; border: 1px solid #ddd; border-radius: 7px;
  font-size: 0.88rem; font-family: inherit; color: #1a1a1a; background: #fafaf8;
  transition: border-color 0.15s, box-shadow 0.15s; outline: none;
}
input:focus { border-color: #1a1a1a; box-shadow: 0 0 0 3px rgba(26,26,26,0.07); background: #fff; }
.info-box { background: #f9f8f5; border-radius: 7px; padding: 0.75rem 1rem; border-left: 3px solid #29cad4; font-size: 0.8rem; color: #666; line-height: 1.6; margin-bottom: 1rem; }
.service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
.checkbox-item { display: flex; align-items: center; gap: 8px; padding: 0.45rem 0.7rem; border: 1px solid #eee; border-radius: 7px; cursor: pointer; font-size: 0.82rem; color: #444; transition: background 0.1s; }
.checkbox-item:hover { background: #f9f8f5; border-color: #ddd; }
.checkbox-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: #1a1a1a; cursor: pointer; flex-shrink: 0; }
.checkbox-item.checked { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.required-note { font-size: 0.75rem; color: #999; margin-bottom: 1.25rem; }
.required-note span { color: #e24b4a; }
.bank-note { font-size: 0.75rem; color: #aaa; margin-top: 0.4rem; }
.btn-generate { width: 100%; padding: 1rem; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em; margin-top: 0.5rem; }
.btn-generate:hover { background: #333; }
.btn-generate:active { transform: scale(0.99); }
.btn-generate:disabled { background: #888; cursor: not-allowed; }
.success-msg { display: none; margin-top: 1rem; padding: 0.9rem; background: #eaf3de; border-radius: 8px; color: #3b6d11; font-size: 0.85rem; text-align: center; }
@media (max-width: 580px) {
  .field-grid, .service-grid { grid-template-columns: 1fr; }
  .field.span2 { grid-column: span 1; }
}
</style>
</head>

    <p>供應商合作合約書 — 資料填寫表單</p>

</header>
<div class="container">
  <p class="required-note"><span>*</span> 為必填欄位</p>

  <!-- 供應商基本資料 -->
  <div class="section">
    <div class="section-title">供應商基本資料</div>
    <div class="field-grid">
      <div class="field span2">
        <label>供應商法定名稱 <span class="req">*</span></label>
        <input type="text" id="company_name" placeholder="請輸入公司登記全名">
      </div>
      <div class="field">
        <label>統一編號 / 登記號碼</label>
        <input type="text" id="tax_id" placeholder="若有請填寫">
      </div>
      <div class="field">
        <label>負責人姓名 <span class="req">*</span></label>
        <input type="text" id="rep_name" placeholder="負責人或代表人">
      </div>
      <div class="field span2">
        <label>註冊地址 <span class="req">*</span></label>
        <input type="text" id="reg_address" placeholder="公司登記地址">
      </div>
      <div class="field span2">
        <label>聯絡地址 <span class="req">*</span></label>
        <input type="text" id="contact_address" placeholder="若與註冊地址相同請重複填寫">
      </div>
      <div class="field">
        <label>聯絡人 <span class="req">*</span></label>
        <input type="text" id="contact_name" placeholder="業務聯絡窗口">
      </div>
      <div class="field">
        <label>聯絡電話 <span class="req">*</span></label>
        <input type="tel" id="contact_tel" placeholder="含國碼，如 +886-2-XXXX-XXXX">
      </div>
      <div class="field span2">
        <label>聯絡人 E-mail <span class="req">*</span></label>
        <input type="email" id="contact_email" placeholder="business@example.com">
      </div>
    </div>
  </div>

  <!-- 合約期間 -->
  <div class="section">
    <div class="section-title">合約期間</div>
    <div class="info-box">合約起始日即為簽約日期，將自動帶入合約所有相關日期欄位。</div>
    <div class="field-grid">
      <div class="field">
        <label>合約起始日（簽約日期）<span class="req">*</span></label>
        <input type="date" id="sign_date">
      </div>
      <div class="field">
        <label>合約結束日期 <span class="req">*</span></label>
        <input type="date" id="end_date">
      </div>
    </div>
  </div>

  <!-- 銀行帳戶 -->
  <div class="section">
    <div class="section-title">收款銀行帳戶資訊</div>
    <div class="info-box">帳款將於每月25個工作天內匯至以下帳戶，請確認資訊正確無誤。</div>
    <div class="field-grid">
      <div class="field span2">
        <label>銀行帳號 <span class="req">*</span></label>
        <input type="text" id="account_number" placeholder="請輸入帳號">
      </div>
      <div class="field span2">
        <label>戶名 <span class="req">*</span></label>
        <input type="text" id="account_name" placeholder="帳戶登記名稱">
      </div>
      <div class="field">
        <label>銀行名稱 <span class="req">*</span></label>
        <input type="text" id="bank_name" placeholder="如：台灣銀行">
      </div>
      <div class="field">
        <label>銀行代碼 <span class="req">*</span></label>
        <input type="text" id="bank_code" placeholder="如：004">
      </div>
      <div class="field">
        <label>分行名稱 <span class="req">*</span></label>
        <input type="text" id="branch_name" placeholder="如：內湖分行">
      </div>
      <div class="field">
        <label>分行代碼 <span class="req">*</span></label>
        <input type="text" id="branch_code" placeholder="如：0047">
      </div>
    </div>
    <p class="bank-note">※ SWIFT CODE、收款行國別、其他代碼將由KKday另行處理，無需填寫。</p>
  </div>

  <!-- 服務類型 -->

document.querySelectorAll('.checkbox-item').forEach(label => {
  const cb = label.querySelector('input');
  function sync() { label.classList.toggle('checked', cb.checked); }
  sync();
  cb.addEventListener('change', sync);
});

function v(id) { return (document.getElementById(id)?.value || '').trim(); }

function fmtDate(s) {
  if (!s) return '　　　年　　月　　日';
  const d = new Date(s + 'T00:00:00');
  return d.getFullYear() + ' 年 ' + String(d.getMonth()+1).padStart(2,'0') + ' 月 ' + String(d.getDate()).padStart(2,'0') + ' 日';
}

async function generatePDF() {
  const required = [
    ['company_name','供應商法定名稱'],['rep_name','負責人姓名'],
    ['reg_address','註冊地址'],['contact_address','聯絡地址'],
    ['contact_name','聯絡人'],['contact_tel','聯絡電話'],
    ['contact_email','聯絡人E-mail'],['sign_date','合約起始日（簽約日期）'],
    ['end_date','合約結束日期'],['account_number','銀行帳號'],
    ['account_name','戶名'],['bank_name','銀行名稱'],
    ['bank_code','銀行代碼'],['branch_name','分行名稱'],['branch_code','分行代碼'],
  ];
  for (const [id, label] of required) {
    if (!v(id)) { alert('請填寫「' + label + '」欄位'); document.getElementById(id)?.focus(); return; }
  }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '產生中，請稍候…';
  const d = {
    company: v('company_name'), tax_id: v('tax_id'), rep: v('rep_name'),
    reg_addr: v('reg_address'), contact_addr: v('contact_address'),
    contact_name: v('contact_name'), contact_tel: v('contact_tel'),
    contact_email: v('contact_email'),
    sign_date: fmtDate(v('sign_date')), end_date: fmtDate(v('end_date')),
    acct_no: v('account_number'), acct_name: v('account_name'),
    bank_name: v('bank_name'), bank_code: v('bank_code'),
    branch_name: v('branch_name'), branch_code: v('branch_code'),
    services: Array.from(document.querySelectorAll('#service_grid input:checked')).map(c=>c.value),
  };
  try {
    await buildAndDownload(d);
    document.getElementById('success_msg').style.display = 'block';
  } catch(e) { console.error(e); alert('PDF產生失敗，請重試。'); }
  btn.disabled = false; btn.textContent = '產生合約書 PDF';
}

// ── PDF rendering ──────────────────────────────────────────────
async function buildAndDownload(d) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const pages = [
    buildPart1(d), buildPart2(d),
    buildPart3a(d), buildPart3b(d), buildPart4(),
  ];
  for (let i=0; i<pages.length; i++) {
    if (i>0) doc.addPage();
    const canvas = await renderPage(pages[i]);
    doc.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297);
  }
  doc.save('KKday供應商合作合約書_' + d.company + '.pdf');
}

// ── Canvas renderer ────────────────────────────────────────────
const DPI=150, PX=v=>Math.round(v*DPI/25.4);
const MW=210, MH=297;

async function renderPage(cmds) {
  const cw=PX(MW), ch=PX(MH), ml=PX(20), mr=PX(20), mt=PX(16);
  const canvas=document.createElement('canvas');
  canvas.width=cw; canvas.height=ch;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch);
  const uw=cw-ml-mr;
  const BS=PX(3.4), BLD=PX(3.7), TTL=PX(4.8), SM=PX(2.9);

  function wrap(text, maxW) {
    const chars=[...text]; let line='', lines=[];
    for(let c of chars){
      const t=line+c;
      if(ctx.measureText(t).width>maxW&&line.length>0){lines.push(line);line=c;}
      else line=t;
    }
    if(line) lines.push(line); return lines;
  }

  let y=mt;

  // load logo image once
  const logoImg = await new Promise(res=>{ const img=new Image(); img.onload=()=>res(img); img.src=LOGO_SRC; });

  for(const cmd of cmds) {
    if(y>ch-PX(18)) break;
    const t=cmd.type;

    if(t==='space') { y+=PX(cmd.h); }

    else if(t==='logo') {
      // draw logo top-right
      const lsize=PX(10);
      ctx.drawImage(logoImg, cw-mr-lsize, mt, lsize, lsize);
      y+=PX(2);
    }

    else if(t==='hrule') {
      ctx.strokeStyle='#ddd'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(ml,y); ctx.lineTo(cw-mr,y); ctx.stroke();
      y+=PX(4);
    }

    else if(t==='title') {
      ctx.font=`600 ${TTL}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#1a1a1a';
      const tw=ctx.measureText(cmd.text).width;
      ctx.fillText(cmd.text, ml+(uw-tw)/2, y+TTL);
      y+=Math.round(TTL*2.2);
    }

    else if(t==='subtitle') {
      ctx.font=`500 ${BLD}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#888';
      ctx.fillText(cmd.text, ml, y+BLD);
      y+=Math.round(BLD*1.8);
    }

    else if(t==='bold') {
      ctx.font=`600 ${BLD}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#1a1a1a';
      const lines=wrap(cmd.text, uw);
      for(const l of lines){ ctx.fillText(l,ml,y+BLD); y+=Math.round(BLD*1.65); }
    }

    else if(t==='body') {
      ctx.font=`normal ${BS}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle=cmd.color||'#333';
      const lines=wrap(cmd.text, cmd.maxW||uw);
      const lh=Math.round(BS*(cmd.lh||1.65));
      for(const l of lines){
        if(y+BS>ch-PX(16)) break;
        ctx.fillText(l, cmd.x||ml, y+BS); y+=lh;
      }
    }

    else if(t==='indent') {
      ctx.font=`normal ${BS}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#333';
      const ix=ml+PX(5), iw=uw-PX(5);
      const lines=wrap(cmd.text, iw);
      for(const l of lines){
        if(y+BS>ch-PX(16)) break;
        ctx.fillText(l, ix, y+BS); y+=Math.round(BS*1.65);
      }
    }

    else if(t==='field') {
      ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#888';
      ctx.fillText(cmd.label, ml, y+SM);
      const lw=ctx.measureText(cmd.label).width;
      ctx.fillStyle='#1a1a1a';
      ctx.font=`normal ${BS}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillText(cmd.value||'', ml+lw+PX(1), y+BS);
      y+=Math.round(BS*1.9);
    }

    else if(t==='signline') {
      ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#888'; ctx.fillText(cmd.label, ml, y+SM);
      const lw=ctx.measureText(cmd.label).width;
      ctx.strokeStyle='#aaa'; ctx.lineWidth=0.7;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(ml+lw+PX(2),y+SM+2); ctx.lineTo(ml+lw+PX(45),y+SM+2); ctx.stroke();
      ctx.setLineDash([]);
      y+=Math.round(SM*2.5);
    }

    else if(t==='sigblock') {
      // company name bold
      ctx.font=`600 ${BS}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#1a1a1a'; ctx.fillText(cmd.company, ml, y+BS);
      y+=Math.round(BS*1.8);
      // fields
      const fields=[
        ['負責人：', cmd.rep||''],
        ['註冊地址：', cmd.reg||''],
        ['聯絡地址：', cmd.caddr||''],
        ['聯絡人：', cmd.cname||''],
        ['聯絡電話：', cmd.ctel||''],
        ['聯絡人E-mail：', cmd.email||''],
      ];
      for(const [lb,val] of fields){
        ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
        ctx.fillStyle='#777'; ctx.fillText(lb, ml, y+SM);
        const lw=ctx.measureText(lb).width;
        ctx.fillStyle='#1a1a1a';
        ctx.font=`normal ${BS}px 'Microsoft JhengHei',sans-serif`;
        // wrap long values
        const maxvw=uw-lw-PX(2);
        const vlines=wrap(val,maxvw);
        ctx.fillText(vlines[0]||'', ml+lw+PX(1), y+BS);
        y+=Math.round(BS*1.75);
        for(let i=1;i<vlines.length;i++){ ctx.fillText(vlines[i], ml+lw+PX(1), y+BS); y+=Math.round(BS*1.75); }
      }
      y+=PX(3);
      // dash line
      ctx.strokeStyle='#aaa'; ctx.lineWidth=0.6; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(ml,y); ctx.lineTo(ml+PX(55),y); ctx.stroke();
      ctx.setLineDash([]); y+=PX(2);
      ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
      ctx.fillStyle='#aaa'; ctx.fillText('（此處蓋章或簽名）',ml,y+SM);
      y+=PX(7);
    }

    else if(t==='banktable') {
      const rowH=PX(7.5), c1=PX(24), c2=uw/2-c1, c3=PX(24), c4=uw/2-c3;
      const rows=[
        ['銀行帳號', cmd.acct_no, '戶名', cmd.acct_name],
        ['銀行名稱', cmd.bank_name, '銀行代碼', cmd.bank_code],
        ['分行名稱', cmd.branch_name, '分行代碼', cmd.branch_code],
        ['SWIFT CODE','（依個案需要填寫）','收款行國別',''],
        ['其他代碼
□CNAPS □SKN CODE
□BSB NUMBER □IBAN CODE','','','（依個案需要勾選及填寫）'],
      ];
      for(const row of rows){
        const cols=[c1,c2,c3,c4]; let xo=ml;
        const rh = row[0].includes('\n') ? rowH*2.2 : rowH;
        for(let ci=0;ci<4;ci++){
          ctx.strokeStyle='#ccc'; ctx.lineWidth=0.5;
          ctx.strokeRect(xo,y,cols[ci],rh);
          const isLabel=ci%2===0;
          ctx.font=`${isLabel?'600':'normal'} ${PX(2.8)}px 'Microsoft JhengHei',sans-serif`;
          ctx.fillStyle=isLabel?'#555':'#1a1a1a';
          if(row[ci]){
            const lines=row[ci].split('\n');
            lines.forEach((ln,li)=>{ ctx.fillText(ln, xo+PX(1.5), y+PX(2.8)*(li+1)+PX(1.5)); });
          }
          xo+=cols[ci];
        }
        y+=rh;
      }
      y+=PX(2);
    }

    else if(t==='servicetable') {
      const all=['套裝旅遊','旅宿類（如旅館、民宿、露營）','餐飲類','租車類',
        '車類交通接送類','非車類交通接送類（如：輕航機、直升機、遊艇）',
        '定點活動體驗類','景點票、展演票','實體商品（如：SIM Card、伴手禮）',
        '器材租賃（如：Wifi機）','委託服務（如：代辦、配送、行李托運）','其他'];
      const sel=cmd.services||[];
      const rh=PX(6.5), cw2=PX(12);
      // header
      ctx.fillStyle='#f5f4f0';
      ctx.fillRect(ml,y,cw2,rh); ctx.fillRect(ml+cw2,y,uw-cw2,rh);
      ctx.strokeStyle='#bbb'; ctx.lineWidth=0.5;
      ctx.strokeRect(ml,y,cw2,rh); ctx.strokeRect(ml+cw2,y,uw-cw2,rh);
      ctx.font=`600 ${SM}px 'Microsoft JhengHei',sans-serif`; ctx.fillStyle='#555';
      ctx.fillText('請勾選', ml+PX(1), y+rh/2+PX(1.2));
      ctx.fillText('提供商品或服務類型', ml+cw2+PX(2), y+rh/2+PX(1.2));
      y+=rh;
      for(const svc of all){
        const checked=sel.includes(svc);
        ctx.strokeStyle='#ddd'; ctx.lineWidth=0.5;
        ctx.strokeRect(ml,y,cw2,rh); ctx.strokeRect(ml+cw2,y,uw-cw2,rh);
        const bx=ml+cw2/2-PX(2), by=y+rh/2-PX(2);
        ctx.strokeStyle='#999'; ctx.lineWidth=0.7;
        ctx.strokeRect(bx,by,PX(4),PX(4));
        if(checked){ ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx+PX(0.5),by+PX(0.5),PX(3),PX(3)); }
        ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`; ctx.fillStyle='#1a1a1a';
        ctx.fillText(svc, ml+cw2+PX(2), y+rh/2+PX(1.2));
        y+=rh;
      }
      y+=PX(2);
    }

    else if(t==='evaltable') {
      const items=cmd.items||[];
      const c1w=PX(45), c2w=uw-c1w;
      // header
      ctx.fillStyle='#f0f0f0';
      ctx.fillRect(ml,y,c1w,PX(8)); ctx.fillRect(ml+c1w,y,c2w,PX(8));
      ctx.strokeStyle='#bbb'; ctx.lineWidth=0.5;
      ctx.strokeRect(ml,y,c1w,PX(8)); ctx.strokeRect(ml+c1w,y,c2w,PX(8));
      ctx.font=`600 ${SM}px 'Microsoft JhengHei',sans-serif`; ctx.fillStyle='#333';
      ctx.fillText('項目', ml+PX(2), y+PX(5));
      ctx.fillText('處理方式', ml+c1w+PX(2), y+PX(5));
      y+=PX(8);
      for(const item of items){
        const llines=wrap(item.label, c1w-PX(4));
        const rlines=wrap(item.value, c2w-PX(4));
        const lineH=PX(4.2);
        const rowH2=Math.max(llines.length,rlines.length)*lineH+PX(4);
        if(y+rowH2>ch-PX(16)) break;
        ctx.strokeStyle='#ddd'; ctx.lineWidth=0.4;
        ctx.strokeRect(ml,y,c1w,rowH2); ctx.strokeRect(ml+c1w,y,c2w,rowH2);
        ctx.font=`${item.bold?'600':'normal'} ${SM}px 'Microsoft JhengHei',sans-serif`;
        ctx.fillStyle='#1a1a1a';
        llines.forEach((l,i)=>ctx.fillText(l, ml+PX(2), y+PX(3)+lineH*(i+0.8)));
        ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
        rlines.forEach((l,i)=>ctx.fillText(l, ml+c1w+PX(2), y+PX(3)+lineH*(i+0.8)));
        y+=rowH2;
      }
    }
  }

  // page footer
  ctx.font=`normal ${SM}px 'Microsoft JhengHei',sans-serif`;
  ctx.fillStyle='#ccc';
  ctx.fillText('KKday 供應商合作合約書', ml, ch-PX(8));

  return canvas;
}
